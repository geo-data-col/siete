<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIETE - Sistema de Información Estadístico</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="estilos.css">
</head>

<body>

    <div id="pantalla-login" class="login-container">
        <div class="login-card">
            <div class="login-logo">
                <span class="icon-logo"> </span>
                <h1>SIETE</h1>
                <p>Sistema de Información Estadístico</p>
            </div>
            <form id="formulario-login">
                <div class="grupo-input">
                    <label for="usuario-nombre">Nombre de usuario</label>
                    <input type="text" id="usuario-nombre" placeholder="ej: yovanny" required>
                </div>
                <div class="grupo-input">
                    <label for="usuario-password">Contraseña</label>
                    <input type="password" id="usuario-password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-ingresar">Ingresar al Sistema</button>
            </form>
            <p id="error-login" class="mensaje-error"></p>
        </div>
    </div>

    <div class="contenedor-principal" id="contenido-plataforma" style="display: none;">

        <aside class="panel-lateral">

            <div style="display:flex; align-items:center; gap:10px;">
                <span style="font-size:1.8rem;">🛡️</span>
                <div>
                    <h2 style="font-size:1.4rem;color:#fff;margin:0;font-weight:800;">SIETE</h2>
                    <small style="color:#38bdf8;font-size:0.7rem;">Análisis Criminalístico</small>
                </div>
            </div>

            <div class="info-adicional">
                <h3>🚨 Tipo de Delito</h3>
                <select id="filtro-delito" style="width:100%;padding:10px;border-radius:6px;border:1px solid #475569;background:#0f172a;color:white;font-size:0.9rem;">
                    <option value="todos">— Todos los delitos —</option>
                    <option value="homicidios">Homicidios</option>
                    <option value="lesiones">Lesiones Personales</option>
                    <option value="hurto_personas">Hurto a Personas</option>
                    <option value="hurto_residencias">Hurto a Residencias</option>
                    <option value="hurto_comercio">Hurto a Comercio</option>
                    <option value="hurto_bancos">Hurto a Bancos</option>
                    <option value="hurto_automotores">Hurto Automotores</option>
                    <option value="hurto_motocicletas">Hurto Motocicletas</option>
                    <option value="hurto_celulares">Hurto Celulares</option>
                    <option value="hurto_bicicletas">Hurto Bicicletas</option>
                    <option value="hurto_abigeato">Hurto Abigeato</option>
                    <option value="extorsion">Extorsión</option>
                    <option value="secuestro">Secuestro</option>
                    <option value="terrorismo">Terrorismo</option>
                </select>
            </div>

            <div class="info-adicional">
                <h3>📅 Rango de Fechas</h3>
                <label style="color:#94a3b8;font-size:0.8rem;">Desde:</label>
                <input type="date" id="filtro-fecha-inicio"
                    style="width:100%;padding:8px;border-radius:6px;border:1px solid #475569;background:#0f172a;color:white;margin-bottom:8px;">
                <label style="color:#94a3b8;font-size:0.8rem;">Hasta:</label>
                <input type="date" id="filtro-fecha-fin"
                    style="width:100%;padding:8px;border-radius:6px;border:1px solid #475569;background:#0f172a;color:white;">
            </div>

            <div class="info-adicional">
                <h3>🚔 Estación / Área</h3>
                <select id="filtro-estacion" style="width:100%;padding:10px;border-radius:6px;border:1px solid #475569;background:#0f172a;color:white;font-size:0.85rem;">
                    <option value="">— Todas las estaciones —</option>
                    <option value="ESTACION ARANJUEZ">Estación Aranjuez</option>
                    <option value="ESTACION BARBOSA">Estación Barbosa</option>
                    <option value="ESTACION BELEN">Estación Belén</option>
                    <option value="ESTACION BELLO">Estación Bello</option>
                    <option value="ESTACION BUENOS AIRES">Estación Buenos Aires</option>
                    <option value="ESTACION CALDAS">Estación Caldas</option>
                    <option value="ESTACION CANDELARIA">Estación Candelaria</option>
                    <option value="ESTACION CASTILLA">Estación Castilla</option>
                    <option value="ESTACION COPACABANA">Estación Copacabana</option>
                    <option value="ESTACION DOCE DE OCTUBRE">Estación Doce de Octubre</option>
                    <option value="ESTACION ENVIGADO">Estación Envigado</option>
                    <option value="ESTACION GIRARDOTA">Estación Girardota</option>
                    <option value="ESTACION ITAGUI">Estación Itagüí</option>
                    <option value="ESTACION LA ESTRELLA">Estación La Estrella</option>
                    <option value="ESTACION LAURELES">Estación Laureles</option>
                    <option value="ESTACION MANRIQUE">Estación Manrique</option>
                    <option value="ESTACION POBLADO">Estación Poblado</option>
                    <option value="ESTACION POPULAR">Estación Popular</option>
                    <option value="ESTACION SABANETA">Estación Sabaneta</option>
                    <option value="ESTACION SAN ANTONIO DE PRADO">Estación San Antonio de Prado</option>
                    <option value="ESTACION SAN JAVIER">Estación San Javier</option>
                    <option value="ESTACION SANTA CRUZ">Estación Santa Cruz</option>
                    <option value="ESTACION VILLA HERMOSA">Estación Villa Hermosa</option>
                </select>
            </div>

            <div class="info-adicional">
                <h3>🗺️ Modo de Visualización</h3>
                <select id="filtro-modo" style="width:100%;padding:10px;border-radius:6px;border:1px solid #475569;background:#0f172a;color:white;font-size:0.9rem;">
                    <option value="puntos">📍 Puntos por delito</option>
                    <option value="calor">🔥 Mapa de calor</option>
                </select>
            </div>

            <button onclick="aplicarFiltros()" style="background:#38bdf8;color:#0f172a;border:none;padding:12px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:1rem;width:100%;">
                🔍 Consultar
            </button>

            <button onclick="limpiarFiltros()" style="background:#334155;color:white;border:none;padding:10px;border-radius:6px;cursor:pointer;font-weight:600;font-size:0.9rem;width:100%;">
                🔄 Limpiar filtros
            </button>
            <button onclick="abrirEstadisticas()" style="background:#6366f1;color:white;border:none;padding:12px;border-radius:6px;cursor:pointer;font-weight:bold;font-size:1rem;width:100%;">
    📊 Estadísticas
</button>

            <button id="btn-cerrar-sesion" style="margin-top:auto;background:#ef4444;color:white;border:none;padding:10px;border-radius:6px;cursor:pointer;font-weight:bold;">
                🚪 Cerrar Sesión
            </button>

        </aside>

        <main id="mapa"></main>

    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="app.js"></script>
</body>

</html>
